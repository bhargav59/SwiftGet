name: SwiftGet
options:
  bundleIdPrefix: com.swiftget
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_MODULES: YES
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    PRODUCT_BUNDLE_IDENTIFIER: com.swiftget.app
    INFOPLIST_FILE: SwiftGet/Resources/Info.plist
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  SwiftGet:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: SwiftGet
        excludes:
          - Resources/Info.plist
    resources:
      - SwiftGet/Resources/Info.plist
    settings:
      base:
        PRODUCT_NAME: SwiftGet
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftget.app
        INFOPLIST_FILE: SwiftGet/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: ""
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: targeted
